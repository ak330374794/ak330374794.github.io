<script>
        // 日历生成逻辑
        let currentYear = 2026;
        let currentMonth = 5; // 0-indexed, 5 is June

        const postDates = [1, 5, 10, 15, 20, 25, 28]; // 模拟有文章的日期

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthLabel = document.getElementById('calendar-month');
            grid.innerHTML = '';
            
            const date = new Date(currentYear, currentMonth, 1);
            const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
            monthLabel.innerText = `${currentYear}年 ${monthNames[currentMonth]}`;

            const firstDay = date.getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // 空白格
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                grid.appendChild(empty);
            }

            // 日期格
            for (let d = 1; d <= daysInMonth; d++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day text-sm text-slate-600';
                dayEl.innerText = d;
                
                if (postDates.includes(d) && currentMonth === 5) {
                    dayEl.classList.add('has-post');
                }
                
                dayEl.onclick = () => {
                    document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('active'));
                    dayEl.classList.add('active');
                };
                
                grid.appendChild(dayEl);
            }
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        renderCalendar();

        // 滚动揭示
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
